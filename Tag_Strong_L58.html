<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Strong</title>
</head>
<body>
    <p>perhatikan bahwa <strong>keselamatan</strong> adalah prioritas utama</p>
    <p>perbedaan teks strong dan tag b
        <ul>
            <li>tag <code>&lt;b&gt;</code> juga membuat teks menjadi tebal, tetapi tidak memberikan makna semantik apapun</li>
            <li>tag <code>&lt;strong&gt;</code> secara semantik menyampaikan bahwa teks yang berada di dalambnya memiliki arti lebih penting (tebal)</li>
        </ul>
    </p>
</body>
</html>
