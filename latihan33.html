<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 33 - Form Search</title>
</head>
<body>
    <!-- ditambahkan ketika ingin membuat fitur pencarian data -->
    <input type="search" >
    <button type="submit">Cari</button>

    <!-- Pertemuan  34 - Input Number -->
     <p><input type="number"></p> <!--hanya menerima angka-->
     <button type="submit">kirim data</button>

     <p><input type="number" min="3"></p> <!--minimal input user adalah 3-->
     <button type="submit">kirim data</button>

     <p><input type="number" max="9"></p> <!--max input user adalah 9-->
     <button type="submit">kirim data</button>

     <p><input type="number" min="5" max="20" step="2"></p> <!--jadi min input 5 dan max 20 tapi kelipatan 2-->
     <button type="submit">Kirim data</button>


     <!-- Pertemuan 35 - Nomor Telepon -->
    <p>Masukkan No HP: <input type="tel" name="" id=""></p> <!--ketika dijalankan di versi mobile kangsung muncul papan nomor-->
    <button type="submit">Kirim Nomor</button>

    <!--pertemuan 36 - Tanggal dna Waktu-->
    <form action="">
        <p>Tanggal: <input type="date"></p>
        <p>waktu: <input type="time"></p>
        <p>Taggal dan waktu: <input type="datetime-local"></p>
        <p>Bulan dan Tahun: <input type="month"></p>
        <p>Minggu ke- <input type="week"></p>
    </form>


</body>
</html>
