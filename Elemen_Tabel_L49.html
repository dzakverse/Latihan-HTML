<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemen Tabel</title>
</head>
<body>
    <table border="1">
    <caption>Elemen Tambahan Pada Tabel</caption><!--judul pada tabel-->
    <thead>
    <colgroup>
        <col style="background-color: antiquewhite;" width="150px"><!--untuk memberikan style tertentu pada kolom-->
        <col style="background-color: beige;">
        <col style="background-color: azure;">
    </colgroup>
    <tr> <!--judul kolom-->
        <th>Judul 1</th>
        <th>Judul 2</th>
        <th>Judul 3</th>
    </tr>
    </thead>
    
    <tbody>
    <tr>
        <td>Baris 1 kolom 1</td>
        <td>Baris 1 kolom 2</td>
        <td>Baris 1 kolom 3</td>
    </tr>
    <tr>
        <td>Baris 2 kolom 1</td>
        <td>Baris 2 kolom 2</td>
        <td>Baris 2 kolom 3</td>
    </tr>
    </tbody>

    <tfoot>
    <tr>
        <td>jumlah siswa</td>
        <td>100 siswa</td>
    </tr>
    </tfoot>

    </table>
</body>
</html>
