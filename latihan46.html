<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 46 - Date Time Tag</title>
</head>
<body>
    <h2>Judul Artikel</h2>
    <p>Tanggal Publish : <time datetime="2024-09-19T10:30:00+07:00"></time>19 September 2024, Pukul 10:30 WIB</p> <!--tag time digunakan untuk menandai elemen yang berisi informai waktu atau tanggal-->
    <!-- fungsi utama tag <time> dan atribut datetime : 
        1. meningkatkan SEO
        2. meningkatkan aksesibilitas
        3. mempermudah pengelolaan konten
        4. membuat konten lebih informatif -->

    <p>pesanan anda akan tiba dalam waktu sekitar <time datetime="2024-09-10T15:00:00+07:00"></time>3 hari kerja</p>
</body>
</html>
