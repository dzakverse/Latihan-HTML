<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Objek</title>
</head>
<body>
    <!--tag objek digunakan untuk menyisipkan berbagai jenis konten eksternal di web-->
    <!--menampilkan pdf-->
    <object data="media/MODUL PRAKTIKUM Pemrograman Web 2024.pdf" type="application/pdf" width="1600" height="1200">
        <p>Browser mu ga bisa nampilin file ini</p> <!--ini cuma muncul klo browser ga suport file yg mau di tampilin-->
    </object>

    <object data="media/MODUL PRAKTIKUM Pemrograman Web 2025.pdf" type="application/pdf" width="1600" height="1200">
        <p>Browser mu ga bisa nampilin file ini</p>
        <a href="media/MODUL PRAKTIKUM Pemrograman Web 2024.pdf">Unduh file ini</a> <!--ini cuma muncul klo browser ga suport file yg mau di tampilin-->
    </object> <br>

    <object data="https://www.wikipedia.org/" type="text/html" width="1600" height="1200">
        <p>Browser mu ga bisa menampilkan situs ini</p>
    </object>

    <object data="https://www.wikpeda.org/" type="text/html" width="1600" height="1200">
        <p>Browser mu ga bisa menampilkan situs ini</p>
    </object>
</body>
</html>
