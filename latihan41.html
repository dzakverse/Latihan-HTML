<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File</title>
</head>
<body>
    <form action="" enctype="multipart/form-data"> <!--atribut penting yang menentukan bagaimana file ini akan di proses di web server-->
        <p>Upload Gambar <input type="file"></p>
        <p>Upload hanya gambar<input type="file" accept="image/*"></p>
        <p>Upload hanya video<input type="file" accept="video/*"></p>
        <p>Upload hanya audio<input type="file" accept="audio/*"></p>

    </form>
</body>
</html>
